<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DemandFlow | AI驱动的产品需求管理系统</title>
    <style>
        :root {
            --primary: #6366f1;
            --surface: #f8fafc;
            --border: #e2e8f0;
            --text: #1e293b;
            --text-light: #64748b;
            --success: #10b981;
            --danger: #ef4444;
        }
        
        body { 
            font-family: -apple-system, sans-serif;
            background: var(--surface);
            color: var(--text);
            padding: 20px;
        }
        
        .metrics-category {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }
        
        .category-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--text);
        }
        
        .metrics-filter {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        
        .filter-tag {
            padding: 8px 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        
        .filter-tag:hover {
            background: var(--surface);
            border-color: var(--primary);
        }
        
        .filter-tag.selected {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        
        /* 气泡样式 */
        .impact-bubble {
            position: absolute;
            background: white;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            border: 1px solid var(--border);
            z-index: 100;
            min-width: 200px;
            display: none;
            top: 100%;
            left: 0;
            margin-top: 8px;
        }
        
        .bubble-header {
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text);
        }
        
        .bubble-impact-options {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .bubble-impact-option {
            padding: 6px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .bubble-impact-option:hover {
            background: var(--surface);
        }
        
        .bubble-impact-option.selected {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        
        .bubble-impact-option.increase {
            border-color: var(--success);
        }
        
        .bubble-impact-option.increase.selected {
            background: var(--success);
            color: white;
        }
        
        .bubble-impact-option.decrease {
            border-color: var(--danger);
        }
        
        .bubble-impact-option.decrease.selected {
            background: var(--danger);
            color: white;
        }
        
        /* 已选指标 */
        .selected-metrics {
            background: white;
            border-radius: 12px;
            padding: 24px;
            margin-top: 32px;
            border: 1px solid var(--border);
        }
        
        .selected-metric-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }
        
        .selected-metric-item:last-child {
            border-bottom: none;
        }
        
        .metric-impact {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .impact-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        
        .impact-badge.increase-slight {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
        }
        
        .impact-badge.increase-large {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success);
        }
        
        .impact-badge.decrease-slight {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
        }
        
        .impact-badge.decrease-large {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
        }
        
        .remove-metric {
            background: none;
            border: none;
            color: var(--danger);
            cursor: pointer;
            font-size: 1.25rem;
            padding: 0 8px;
        }
    </style>
</head>
<body>
    <h1>预期指标表现（简化测试版）</h1>
    
    <!-- 北极星指标 -->
    <div class="metrics-category" style="border: 2px solid var(--primary);">
        <div class="category-title">
            ⭐ 北极星指标（默认GMV，可在项目设置中修改）
        </div>
        
        <div class="metrics-filter">
            <div class="filter-tag selected" data-metric="gmv" data-category="northStar">
                GMV（商品交易总额）
                <div class="impact-bubble" id="bubble-gmv">
                    <div class="bubble-header">选择影响程度</div>
                    <div class="bubble-impact-options">
                        <div class="bubble-impact-option increase selected" data-impact="increase-slight">轻微增加</div>
                        <div class="bubble-impact-option increase" data-impact="increase-large">大幅增加</div>
                        <div class="bubble-impact-option decrease" data-impact="decrease-slight">轻微减少</div>
                        <div class="bubble-impact-option decrease" data-impact="decrease-large">大幅减少</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 用户行为指标 -->
    <div class="metrics-category">
        <div class="category-title">👤 用户行为指标</div>
        
        <div class="metrics-filter">
            <div class="filter-tag" data-metric="dau" data-category="userBehavior">
                DAU（日活跃用户数）
                <div class="impact-bubble" id="bubble-dau">
                    <div class="bubble-header">选择影响程度</div>
                    <div class="bubble-impact-options">
                        <div class="bubble-impact-option increase selected" data-impact="increase-slight">轻微增加</div>
                        <div class="bubble-impact-option increase" data-impact="increase-large">大幅增加</div>
                        <div class="bubble-impact-option decrease" data-impact="decrease-slight">轻微减少</div>
                        <div class="bubble-impact-option decrease" data-impact="decrease-large">大幅减少</div>
                    </div>
                </div>
            </div>
            
            <div class="filter-tag" data-metric="mau" data-category="userBehavior">
                MAU（月活跃用户数）
                <div class="impact-bubble" id="bubble-mau">
                    <div class="bubble-header">选择影响程度</div>
                    <div class="bubble-impact-options">
                        <div class="bubble-impact-option increase selected" data-impact="increase-slight">轻微增加</div>
                        <div class="bubble-impact-option increase" data-impact="increase-large">大幅增加</div>
                        <div class="bubble-impact-option decrease" data-impact="decrease-slight">轻微减少</div>
                        <div class="bubble-impact-option decrease" data-impact="decrease-large">大幅减少</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 已选指标汇总 -->
    <div class="selected-metrics" id="selectedMetrics">
        <div style="font-weight: 600; margin-bottom: 16px;">已选指标：</div>
        <div id="selectedMetricsList">
            <!-- 这里会动态添加已选指标 -->
        </div>
    </div>

    <script>
        let selectedMetrics = [];
        
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            console.log('预期指标页面已加载');
            
            // 初始化北极星指标（默认选中）
            saveMetricSelection('northStar', 'gmv', 'increase-slight');
            
            // 为所有筛选标签添加点击事件
            document.querySelectorAll('.filter-tag').forEach(tag => {
                tag.addEventListener('click', function(e) {
                    e.stopPropagation(); // 防止事件冒泡
                    
                    const metric = this.dataset.metric;
                    const category = this.dataset.category;
                    
                    // 切换选中状态
                    this.classList.toggle('selected');
                    
                    if (this.classList.contains('selected')) {
                        // 显示气泡
                        const bubbleId = `bubble-${metric}`;
                        const bubble = document.getElementById(bubbleId);
                        if (bubble) {
                            // 隐藏其他气泡
                            document.querySelectorAll('.impact-bubble').forEach(b => {
                                b.style.display = 'none';
                            });
                            
                            // 显示当前气泡
                            bubble.style.display = 'block';
                            
                            // 默认选择"轻微增加"
                            const defaultOption = bubble.querySelector('.bubble-impact-option.increase[data-impact="increase-slight"]');
                            if (defaultOption) {
                                // 清除其他选择
                                bubble.querySelectorAll('.bubble-impact-option').forEach(o => {
                                    o.classList.remove('selected');
                                });
                                
                                defaultOption.classList.add('selected');
                                saveMetricSelection(category, metric, 'increase-slight');
                            }
                        }
                    } else {
                        // 移除选择
                        removeMetricSelection(metric);
                        
                        // 隐藏气泡
                        const bubbleId = `bubble-${metric}`;
                        const bubble = document.getElementById(bubbleId);
                        if (bubble) {
                            bubble.style.display = 'none';
                        }
                    }
                });
            });
            
            // 为气泡选项添加事件
            document.addEventListener('click', function(e) {
                if (e.target.classList.contains('bubble-impact-option')) {
                    const option = e.target;
                    const bubble = option.closest('.impact-bubble');
                    const tag = bubble.parentElement;
                    
                    const metric = tag.dataset.metric;
                    const category = tag.dataset.category;
                    const impact = option.dataset.impact;
                    
                    // 清除同一气泡的其他选择
                    bubble.querySelectorAll('.bubble-impact-option').forEach(o => {
                        o.classList.remove('selected');
                    });
                    
                    // 选中当前选项
                    option.classList.add('selected');
                    
                    // 保存选择
                    saveMetricSelection(category, metric, impact);
                    
                    // 隐藏气泡
                    bubble.style.display = 'none';
                }
            });
            
            // 点击页面其他地方隐藏所有气泡
            document.addEventListener('click', function() {
                document.querySelectorAll('.impact-bubble').forEach(bubble => {
                    bubble.style.display = 'none';
                });
            });
        });
        
        function saveMetricSelection(category, metric, impact) {
            // 移除同指标的旧选择
            selectedMetrics = selectedMetrics.filter(m => m.metric !== metric);
            
            // 添加新选择
            selectedMetrics.push({
                category,
                metric,
                impact,
                name: getMetricName(metric)
            });
            
            updateSelectedMetricsDisplay();
        }
        
        function removeMetricSelection(metric) {
            selectedMetrics = selectedMetrics.filter(m => m.metric !== metric);
            updateSelectedMetricsDisplay();
        }
        
        function getMetricName(metric) {
            const metricNames = {
                'gmv': 'GMV（商品交易总额）',
                'dau': 'DAU（日活跃用户数）',
                'mau': 'MAU（月活跃用户数）'
            };
            
            return metricNames[metric] || metric;
        }
        
        function getImpactText(impact) {
            const impactTexts = {
                'increase-slight': '轻微增加',
                'increase-large': '大幅增加',
                'decrease-slight': '轻微减少',
                'decrease-large': '大幅减少'
            };
            
            return impactTexts[impact] || impact;
        }
        
        function getCategoryName(category) {
            const categoryNames = {
                'northStar': '北极星指标',
                'userBehavior': '用户行为指标'
            };
            
            return categoryNames[category] || category;
        }
        
        function updateSelectedMetricsDisplay() {
            const container = document.getElementById('selectedMetrics');
            const list = document.getElementById('selectedMetricsList');
            
            if (selectedMetrics.length === 0) {
                container.style.display = 'none';
                return;
            }
            
            container.style.display = 'block';
            
            // 清空列表
            list.innerHTML = '';
            
            // 添加每个已选指标
            selectedMetrics.forEach(metric => {
                const item = document.createElement('div');
                item.className = 'selected-metric-item';
                
                const impactClass = metric.impact.replace('-', '-');
                
                item.innerHTML = `
                    <div>
                        <div style="font-weight: 500;">${metric.name}</div>
                        <div style="font-size: 0.875rem; color: var(--text-light);">${getCategoryName(metric.category)}</div>
                    </div>
                    <div class="metric-impact">
                        <div class="impact-badge ${impactClass}">${getImpactText(metric.impact)}</div>
                        <button class="remove-metric" data-metric="${metric.metric}">×</button>
                    </div>
                `;
                
                list.appendChild(item);
            });
            
            // 为删除按钮添加事件
            document.querySelectorAll('.remove-metric').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const metric = this.dataset.metric;
                    removeMetricSelection(metric);
                    
                    // 同时取消筛选标签的选中状态
                    document.querySelectorAll(`.filter-tag[data-metric="${metric}"]`).forEach(tag => {
                        tag.classList.remove('selected');
                    });
                });
            });
        }
    </script>
</body>
</html>
