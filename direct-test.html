<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>直接链接测试</title>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 40px; }
        .test-result { margin: 20px 0; padding: 20px; border-radius: 8px; }
        .success { background: #d1fae5; color: #065f46; }
        .error { background: #fee2e2; color: #991b1b; }
        .testing { background: #fef3c7; color: #92400e; }
        .btn { padding: 10px 20px; background: #3b82f6; color: white; border: none; border-radius: 6px; cursor: pointer; margin: 5px; }
    </style>
</head>
<body>
    <h1>直接链接测试</h1>
    
    <div id="test1" class="test-result testing">
        <h3>测试1: 主页面</h3>
        <p>路径: /prototype/index.html</p>
        <button class="btn" onclick="testLink(1, '/prototype/index.html')">测试</button>
    </div>
    
    <div id="test2" class="test-result testing">
        <h3>测试2: 需求页面（相对路径）</h3>
        <p>路径: ./pages/demand-system-pro.html</p>
        <button class="btn" onclick="testLink(2, './pages/demand-system-pro.html')">测试</button>
    </div>
    
    <div id="test3" class="test-result testing">
        <h3>测试3: 需求页面（绝对路径）</h3>
        <p>路径: /prototype/pages/demand-system-pro.html</p>
        <button class="btn" onclick="testLink(3, '/prototype/pages/demand-system-pro.html')">测试</button>
    </div>
    
    <div id="test4" class="test-result testing">
        <h3>测试4: 原型预览</h3>
        <p>路径: ./prototype-preview.html</p>
        <button class="btn" onclick="testLink(4, './prototype-preview.html')">测试</button>
    </div>
    
    <div id="test5" class="test-result testing">
        <h3>测试5: 原型编辑器</h3>
        <p>路径: ./prototype-editor.html</p>
        <button class="btn" onclick="testLink(5, './prototype-editor.html')">测试</button>
    </div>
    
    <script>
        async function testLink(testNum, path) {
            const element = document.getElementById(`test${testNum}`);
            element.className = 'test-result testing';
            element.innerHTML = `<h3>测试${testNum}: 测试中...</h3><p>路径: ${path}</p>`;
            
            try {
                const response = await fetch(path);
                if (response.ok) {
                    element.className = 'test-result success';
                    element.innerHTML = `
                        <h3>测试${testNum}: ✅ 成功</h3>
                        <p>路径: ${path}</p>
                        <p>状态: ${response.status} ${response.statusText}</p>
                        <button class="btn" onclick="window.location.href='${path}'">访问页面</button>
                    `;
                } else {
                    element.className = 'test-result error';
                    element.innerHTML = `
                        <h3>测试${testNum}: ❌ 失败</h3>
                        <p>路径: ${path}</p>
                        <p>状态: ${response.status} ${response.statusText}</p>
                    `;
                }
            } catch (error) {
                element.className = 'test-result error';
                element.innerHTML = `
                    <h3>测试${testNum}: ❌ 错误</h3>
                    <p>路径: ${path}</p>
                    <p>错误: ${error.message}</p>
                `;
            }
        }
        
        // 自动测试所有链接
        setTimeout(() => {
            testLink(1, '/prototype/index.html');
            setTimeout(() => testLink(2, './pages/demand-system-pro.html'), 500);
            setTimeout(() => testLink(3, '/prototype/pages/demand-system-pro.html'), 1000);
            setTimeout(() => testLink(4, './prototype-preview.html'), 1500);
            setTimeout(() => testLink(5, './prototype-editor.html'), 2000);
        }, 1000);
    </script>
</body>
</html>
