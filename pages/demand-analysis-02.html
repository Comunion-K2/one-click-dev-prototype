<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>增强版原型编辑器 | One-Click Dev</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            /* TDesign 色彩系统 */
            --td-brand-color-1: #e0ebff;
            --td-brand-color-6: #0052d9;
            --td-brand-color-10: #002c7c;
            --td-gray-color-1: #f3f3f3;
            --td-gray-color-3: #e7e7e7;
            --td-gray-color-6: #999;
            --td-gray-color-9: #333;
            --td-text-color-primary: rgba(0, 0, 0, 0.9);
            --td-text-color-secondary: rgba(0, 0, 0, 0.6);
            --td-text-color-placeholder: rgba(0, 0, 0, 0.4);
            
            /* 组件变量 */
            --border-radius-base: 6px;
            --border-radius-medium: 8px;
            --border-radius-large: 12px;
            --shadow-1: 0 1px 2px rgba(0, 0, 0, 0.1);
            --shadow-2: 0 4px 6px rgba(0, 0, 0, 0.1);
            --shadow-3: 0 10px 20px rgba(0, 0, 0, 0.1);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--td-gray-color-1);
            color: var(--td-text-color-primary);
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }
        
        /* 头部 */
        .app-header {
            height: 64px;
            background: white;
            border-bottom: 1px solid var(--td-gray-color-3);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow-1);
        }
        
        .header-left {
            display: flex;
            align-items: center;
            gap: 24px;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            color: var(--td-brand-color-6);
            text-decoration: none;
        }
        
        .project-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .project-name {
            font-weight: 500;
        }
        
        .version-tag {
            background: var(--td-brand-color-1);
            color: var(--td-brand-color-6);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        
        .header-actions {
            display: flex;
            gap: 12px;
        }
        
        .header-btn {
            padding: 8px 16px;
            background: white;
            border: 1px solid var(--td-gray-color-3);
            border-radius: var(--border-radius-base);
            font-size: 0.875rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--td-text-color-secondary);
            transition: all 0.2s;
        }
        
        .header-btn:hover {
            border-color: var(--td-brand-color-6);
            color: var(--td-brand-color-6);
        }
        
        .header-btn.primary {
            background: var(--td-brand-color-6);
            color: white;
            border-color: var(--td-brand-color-6);
        }
        
        .header-btn.primary:hover {
            background: var(--td-brand-color-10);
        }
        
        /* AI生成区域 */
        .ai-generator {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 400px;
            background: white;
            border-radius: var(--border-radius-large);
            box-shadow: var(--shadow-3);
            z-index: 1000;
            display: none;
        }
        
        .ai-generator.active {
            display: block;
        }
        
        .ai-header {
            padding: 16px;
            border-bottom: 1px solid var(--td-gray-color-3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .ai-title {
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .ai-content {
            padding: 16px;
        }
        
        .ai-input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--td-gray-color-3);
            border-radius: var(--border-radius-base);
            font-size: 0.875rem;
            margin-bottom: 12px;
            resize: vertical;
            min-height: 80px;
        }
        
        .ai-examples {
            margin-top: 12px;
        }
        
        .example-item {
            padding: 8px 12px;
            background: var(--td-gray-color-1);
            border-radius: var(--border-radius-base);
            font-size: 0.75rem;
            color: var(--td-text-color-secondary);
            margin-bottom: 8px;
            cursor: pointer;
        }
        
        .example-item:hover {
            background: var(--td-brand-color-1);
        }
        
        /* 主布局 */
        .main-container {
            display: flex;
            height: calc(100vh - 64px);
        }
        
        /* 左侧工具栏 */
        .left-toolbar {
            width: 80px;
            background: white;
            border-right: 1px solid var(--td-gray-color-3);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
        }
        
        .tool-group {
            margin-bottom: 32px;
            width: 100%;
        }
        
        .tool-title {
            font-size: 0.75rem;
            color: var(--td-text-color-placeholder);
            text-align: center;
            margin-bottom: 12px;
            padding: 0 10px;
        }
        
        .tool-btn {
            width: 100%;
            padding: 12px 0;
            background: transparent;
            border: none;
            color: var(--td-text-color-secondary);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
            font-size: 0.75rem;
        }
        
        .tool-btn:hover {
            background: var(--td-gray-color-1);
            color: var(--td-brand-color-6);
        }
        
        .tool-btn.active {
            color: var(--td-brand-color-6);
            background: var(--td-brand-color-1);
        }
        
        .tool-btn i {
            font-size: 1.25rem;
        }
        
        /* TDesign组件库 */
        .components-panel {
            width: 320px;
            background: white;
            border-right: 1px solid var(--td-gray-color-3);
            display: flex;
            flex-direction: column;
        }
        
        .components-header {
            padding: 20px;
            border-bottom: 1px solid var(--td-gray-color-3);
        }
        
        .components-title {
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .components-search {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--td-gray-color-3);
            border-radius: var(--border-radius-base);
            font-size: 0.875rem;
        }
        
        .components-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        
        .component-category {
            margin-bottom: 24px;
        }
        
        .category-title {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--td-text-color-secondary);
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--td-gray-color-3);
        }
        
        .component-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        
        .component-item {
            background: var(--td-gray-color-1);
            border: 1px solid var(--td-gray-color-3);
            border-radius: var(--border-radius-base);
            padding: 16px;
            cursor: grab;
            text-align: center;
            transition: all 0.2s;
        }
        
        .component-item:hover {
            border-color: var(--td-brand-color-6);
            transform: translateY(-2px);
            box-shadow: var(--shadow-2);
        }
        
        .component-icon {
            font-size: 1.5rem;
            margin-bottom: 8px;
            color: var(--td-text-color-secondary);
        }
        
        .component-name {
            font-size: 0.75rem;
            color: var(--td-text-color-primary);
        }
        
        /* 画布区域 */
        .canvas-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #f8f9fa;
        }
        
        .canvas-header {
            padding: 16px 24px;
            background: white;
            border-bottom: 1px solid var(--td-gray-color-3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .canvas-title {
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .device-selector {
            display: flex;
            gap: 8px;
            background: var(--td-gray-color-1);
            border: 1px solid var(--td-gray-color-3);
            border-radius: var(--border-radius-base);
            padding: 4px;
        }
        
        .device-btn {
            padding: 6px 12px;
            background: transparent;
            border: none;
            border-radius: var(--border-radius-base);
            font-size: 0.875rem;
            cursor: pointer;
            color: var(--td-text-color-secondary);
        }
        
        .device-btn.active {
            background: white;
            color: var(--td-brand-color-6);
            box-shadow: var(--shadow-1);
        }
        
        .canvas-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            overflow: auto;
            position: relative;
        }
        
        .mobile-frame {
            width: 375px;
            height: 667px;
            background: white;
            border: 2px solid var(--td-gray-color-9);
            border-radius: 24px;
            position: relative;
            overflow: hidden;
            box-shadow: var(--shadow-3);
        }
        
        .mobile-notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 20px;
            background: var(--td-gray-color-9);
            border-bottom-left-radius: 12px;
            border-bottom-right-radius: 12px;
            z-index: 10;
        }
        
        .canvas {
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            bottom: 0;
            overflow: auto;
            padding: 20px;
            background: white;
        }
        
        .drop-zone {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--td-text-color-placeholder);
            font-size: 0.875rem;
            text-align: center;
        }
        
        /* 属性面板 */
        .properties-panel {
            width: 320px;
            background: white;
            border-left: 1px solid var(--td-gray-color-3);
            display: flex;
            flex-direction: column;
        }
        
        .properties-header {
            padding: 20px;
            border-bottom: 1px solid var(--td-gray-color-3);
            font-weight: 600;
        }
        
        .properties-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }
        
        .property-group {
            margin-bottom: 24px;
        }
        
        .property-label {
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--td-text-color-primary);
        }
        
        .property-input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--td-gray-color-3);
            border-radius: var(--border-radius-base);
            font-size: 0.875rem;
        }
        
        .color-picker {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        
        .color-box {
            width: 24px;
            height: 24px;
            border-radius: 4px;
            border: 1px solid var(--td-gray-color-3);
            cursor: pointer;
        }
        
        /* 画布组件 */
        .canvas-component {
            position: absolute;
            border: 1px solid var(--td-gray-color-3);
            background: white;
            cursor: move;
            user-select: none;
            padding: 8px;
            border-radius: var(--border-radius-base);
        }
        
        .canvas-component.selected {
            border: 2px solid var(--td-brand-color-6);
            box-shadow: 0 0 0 2px rgba(0, 82, 217, 0.1);
        }
        
        .component-resize-handle {
            position: absolute;
            width: 8px;
            height: 8px;
            background: var(--td-brand-color-6);
            border-radius: 50%;
            bottom: -4px;
            right: -4px;
            cursor: nwse-resize;
        }
        
        /* 响应式 */
        @media (max-width: 1200px) {
            .components-panel,
            .properties-panel {
                width: 280px;
            }
        }
        
        @media (max-width: 900px) {
            .main-container {
                flex-direction: column;
            }
            
            .left-toolbar,
            .components-panel,
            .properties-panel {
                width: 100%;
                height: auto;
            }
        }
    </style>
</head>
<body>
    <!-- 头部 -->
    <header class="app-header">
        <div class="header-left">
            <a href="https://one-click-dev-prototype.vercel.app/prototype/index.html" class="logo">
                <i class="fas fa-bolt"></i>
                <span>One-Click Dev</span>
            </a>
            
            <div class="project-info">
                <span class="project-name">电商APP</span>
                <span class="version-tag">v1.0.3</span>
            </div>
        </div>
        
        <div class="header-actions">
            <button class="header-btn" id="aiGenerateBtn">
                <i class="fas fa-robot"></i>
                <span>AI生成</span>
            </button>
            <button class="header-btn">
                <i class="fas fa-download"></i>
                <span>导出</span>
            </button>
            <button class="header-btn primary" id="saveBtn">
                <i class="fas fa-save"></i>
                <span>保存</span>
            </button>
        </div>
    </header>
</body>
</html>
