<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一键界面生成 - One-Click Dev</title>
    <style>
        :root {
            --design-primary: #8b5cf6;
            --design-secondary: #3b82f6;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; line-height: 1.6; color: #1f2937; background: #f9fafb; }
        .container { max-width: 1400px; margin: 0 auto; padding: 0 20px; }
        
        /* 专业设计头部 */
        .design-header { 
            background: linear-gradient(135deg, var(--design-primary), var(--design-secondary));
            color: white; 
            padding: 60px 0; 
            text-align: center;
        }
        .design-title { font-size: 2.5rem; font-weight: 800; margin-bottom: 16px; }
        .design-subtitle { font-size: 1.125rem; opacity: 0.9; max-width: 800px; margin: 0 auto; }
        
        /* 身份选择卡片 */
        .role-selection { padding: 60px 0; }
        .section-title { font-size: 1.75rem; margin-bottom: 30px; color: #111827; text-align: center; }
        .role-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 25px; }
        .role-card { 
            background: white; 
            padding: 30px 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }
        .role-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.15); }
        .role-card.selected { border-color: currentColor; }
        .role-icon { 
            width: 60px; height: 60px; 
            border-radius: 50%; 
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px;
            font-size: 1.5rem;
            color: white;
        }
        .role-name { font-size: 1.125rem; font-weight: 600; margin-bottom: 10px; }
        .role-desc { font-size: 0.875rem; color: #6b7280; }
        
        /* 按钮 */
        .btn { 
            background: var(--design-primary); 
            color: white; 
            border: none; 
            padding: 12px 32px; 
            border-radius: 8px; 
            font-size: 1rem; 
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            margin-top: 20px;
        }
        .btn:hover { background: #7c3aed; transform: translateY(-2px); }
        .btn:disabled { background: #9ca3af; cursor: not-allowed; transform: none; }
        
        .action-buttons { text-align: center; margin-top: 40px; }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .role-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <!-- 专业设计头部 -->
    <div class="design-header">
        <div class="container">
            <h1 class="design-title">🎨 一键界面生成</h1>
            <p class="design-subtitle">基于你的身份和需求，AI智能生成专业级交互界面。支持多模态输入，个性化设计配置，实时预览调整。</p>
        </div>
    </div>

    <div class="container">
        <!-- 步骤1: 身份选择 -->
        <section class="role-selection" id="roleSection">
            <h2 class="section-title">👤 第一步：选择你的身份</h2>
            <p style="text-align: center; color: #6b7280; margin-bottom: 40px; max-width: 800px; margin-left: auto; margin-right: auto;">
                不同身份将启用不同的引导流程和生成策略，确保产出最符合你需求的界面。
            </p>
            
            <div class="role-grid">
                <div class="role-card" data-role="product" style="color: #3b82f6;">
                    <div class="role-icon" style="background: #3b82f6;">📋</div>
                    <h3 class="role-name">产品经理</h3>
                    <p class="role-desc">需要专业原型进行需求评审和开发沟通</p>
                </div>
                
                <div class="role-card" data-role="design" style="color: #8b5cf6;">
                    <div class="role-icon" style="background: #8b5cf6;">🎨</div>
                    <h3 class="role-name">设计师</h3>
                    <p class="role-desc">寻找设计灵感，探索不同风格方案</p>
                </div>
                
                <div class="role-card" data-role="dev" style="color: #10b981;">
                    <div class="role-icon" style="background: #10b981;">💻</div>
                    <h3 class="role-name">开发者</h3>
                    <p class="role-desc">需要生产就绪代码，减少重复界面工作</p>
                </div>
                
                <div class="role-card" data-role="entrepreneur" style="color: #f59e0b;">
                    <div class="role-icon" style="background: #f59e0b;">🚀</div>
                    <h3 class="role-name">创业者</h3>
                    <p class="role-desc">快速生成演示原型，验证想法获取投资</p>
                </div>
                
                <div class="role-card" data-role="operation" style="color: #ef4444;">
                    <div class="role-icon" style="background: #ef4444;">📈</div>
                    <h3 class="role-name">运营人员</h3>
                    <p class="role-desc">制作高转化页面，进行A/B测试优化</p>
                </div>
                
                <div class="role-card" data-role="other" style="color: #6b7280;">
                    <div class="role-icon" style="background: #6b7280;">👤</div>
                    <h3 class="role-name">其他身份</h3>
                    <p class="role-desc">学生、自由职业者或其他需求</p>
                </div>
            </div>
            
            <div class="action-buttons">
                <button class="btn" id="nextToPhaseBtn" disabled>下一步：选择项目阶段</button>
            </div>
        </section>
    </div>

    <script>
        // 简化版本 - 确保基本交互正常
        console.log('一键界面生成页面已加载');
        
        // 获取DOM元素
        const roleCards = document.querySelectorAll('.role-card');
        const nextBtn = document.getElementById('nextToPhaseBtn');
        
        // 当前选中的身份
        let selectedRole = null;
        
        // 为每个身份卡片添加点击事件
        roleCards.forEach(card => {
            card.addEventListener('click', function() {
                console.log('点击了身份卡片:', this.dataset.role);
                
                // 移除所有卡片的选中状态
                roleCards.forEach(c => c.classList.remove('selected'));
                
                // 添加当前卡片的选中状态
                this.classList.add('selected');
                
                // 更新选中的身份
                selectedRole = this.dataset.role;
                
                // 启用下一步按钮
                nextBtn.disabled = false;
                nextBtn.textContent = `下一步：选择项目阶段 (${getRoleName(selectedRole)})`;
                
                console.log('已选择身份:', selectedRole);
            });
        });
        
        // 下一步按钮点击事件
        nextBtn.addEventListener('click', function() {
            if (selectedRole) {
                alert(`已选择身份: ${getRoleName(selectedRole)}\n\n下一步将进入项目阶段选择。\n\n这是简化演示版本，完整版本包含5步工作流程。`);
                
                // 在实际版本中，这里会跳转到下一个步骤
                // window.location.href = 'ui-generation-phase.html?role=' + selectedRole;
            }
        });
        
        // 获取身份名称
        function getRoleName(role) {
            const roleNames = {
                'product': '产品经理',
                'design': '设计师',
                'dev': '开发者',
                'entrepreneur': '创业者',
                'operation': '运营人员',
                'other': '其他身份'
            };
            return roleNames[role] || '未知身份';
        }
        
        // 添加一些交互效果
        roleCards.forEach(card => {
            card.addEventListener('mouseenter', function() {
                this.style.transform = 'translateY(-5px)';
                this.style.boxShadow = '0 10px 25px rgba(0,0,0,0.15)';
            });
            
            card.addEventListener('mouseleave', function() {
                if (!this.classList.contains('selected')) {
                    this.style.transform = 'translateY(0)';
                    this.style.boxShadow = '0 4px 6px rgba(0,0,0,0.1)';
                }
            });
        });
        
        // 页面加载完成提示
        window.addEventListener('load', function() {
            console.log('页面完全加载完成');
            // 添加一个简单的加载动画
            const title = document.querySelector('.design-title');
            title.style.opacity = '0';
            title.style.transform = 'translateY(20px)';
            
            setTimeout(() => {
                title.style.transition = 'all 0.5s ease';
                title.style.opacity = '1';
                title.style.transform = 'translateY(0)';
            }, 100);
        });
    </script>
</body>
</html>
