<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一键生成原型产品 | One-Click Dev</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- 头部导航栏 -->
        <header class="app-header">
            <div class="header-left">
                <div class="logo">
                    <i class="fas fa-cube"></i>
                    <span>原型生成器</span>
                </div>
                <div class="project-info">
                    <span class="project-name">电商APP</span>
                    <span class="version-badge">v1.0.3</span>
                </div>
            </div>
            <div class="header-right">
                <button class="header-btn">
                    <i class="fas fa-save"></i>
                    <span>保存</span>
                </button>
                <button class="header-btn primary">
                    <i class="fas fa-play"></i>
                    <span>预览</span>
                </button>
                <div class="user-avatar">
                    <i class="fas fa-user"></i>
                </div>
            </div>
        </header>

        <div class="main-content">
            <!-- 左侧边栏 -->
            <aside class="left-sidebar">
                <div class="sidebar-section">
                    <div class="section-header">
                        <i class="fas fa-folder"></i>
                        <span>项目</span>
                    </div>
                    <div class="project-list">
                        <div class="project-item active">
                            <i class="fas fa-shopping-cart"></i>
                            <span>电商APP</span>
                        </div>
                        <div class="project-item">
                            <i class="fas fa-plus"></i>
                            <span>新建项目</span>
                        </div>
                    </div>
                </div>

                <div class="sidebar-section">
                    <div class="section-header">
                        <i class="fas fa-code-branch"></i>
                        <span>版本: v1.0.3</span>
                    </div>
                    <div class="demand-list">
                        <div class="demand-item">
                            <div class="demand-header">
                                <i class="fas fa-chevron-right"></i>
                                <span>需求A: 购物车优化</span>
                            </div>
                            <div class="page-list">
                                <div class="page-item active">
                                    <i class="far fa-file"></i>
                                    <span>购物车页面</span>
                                </div>
                                <div class="page-item">
                                    <i class="far fa-file"></i>
                                    <span>结算页面</span>
                                </div>
                            </div>
                        </div>
                        <div class="demand-item">
                            <div class="demand-header">
                                <i class="fas fa-chevron-right"></i>
                                <span>需求B: 搜索功能优化</span>
                            </div>
                            <div class="page-list">
                                <div class="page-item">
                                    <i class="far fa-file"></i>
                                    <span>搜索页面</span>
                                </div>
                            </div>
                        </div>
                        <div class="demand-item">
                            <div class="demand-header">
                                <i class="fas fa-chevron-right"></i>
                                <span>需求C: 用户登录优化</span>
                            </div>
                            <div class="page-list">
                                <div class="page-item">
                                    <i class="far fa-file"></i>
                                    <span>登录页面</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="sidebar-section">
                    <div class="section-header">
                        <i class="fas fa-layer-group"></i>
                        <span>所有页面</span>
                    </div>
                    <div class="all-pages-list">
                        <div class="page-item">
                            <i class="far fa-file"></i>
                            <span>购物车页面</span>
                        </div>
                        <div class="page-item">
                            <i class="far fa-file"></i>
                            <span>结算页面</span>
                        </div>
                        <div class="page-item">
                            <i class="far fa-file"></i>
                            <span>搜索页面</span>
                        </div>
                        <div class="page-item">
                            <i class="far fa-file"></i>
                            <span>登录页面</span>
                        </div>
                    </div>
                </div>
            </aside>

            <!-- 主内容区 -->
            <main class="content-area">
                <!-- 原型画布区域 -->
                <div class="prototype-section">
                    <div class="section-header">
                        <div class="section-title">
                            <i class="fas fa-mobile-alt"></i>
                            <span>原型画布</span>
                            <span class="canvas-size">375×667</span>
                        </div>
                        <div class="section-actions">
                            <button class="action-btn">
                                <i class="fas fa-undo"></i>
                                <span>撤销</span>
                            </button>
                            <button class="action-btn">
                                <i class="fas fa-redo"></i>
                                <span>重做</span>
                            </button>
                            <button class="action-btn">
                                <i class="fas fa-trash"></i>
                                <span>清空</span>
                            </button>
                        </div>
                    </div>
                    
                    <div class="prototype-canvas-container">
                        <!-- 移动端画布 -->
                        <div class="mobile-canvas" id="mobileCanvas">
                            <!-- 这里将通过JavaScript动态添加组件 -->
                            <div class="canvas-placeholder">
                                <i class="fas fa-arrow-left"></i>
                                <p>从左侧组件库拖拽组件到此处</p>
                                <p>或点击下方组件快速添加</p>
                            </div>
                        </div>
                        
                        <!-- 组件库 -->
                        <div class="component-library">
                            <div class="component-category">
                                <div class="category-title">基础组件</div>
                                <div class="component-list">
                                    <div class="component-item" data-type="rectangle">
                                        <i class="fas fa-square"></i>
                                        <span>矩形</span>
                                    </div>
                                    <div class="component-item" data-type="text">
                                        <i class="fas fa-font"></i>
                                        <span>文本</span>
                                    </div>
                                    <div class="component-item" data-type="icon">
                                        <i class="fas fa-icons"></i>
                                        <span>图标</span>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="component-category">
                                <div class="category-title">属性面板</div>
                                <div class="property-panel">
                                    <div class="property-item">
                                        <label>灰度调节</label>
                                        <div class="grayscale-control">
                                            <input type="range" id="grayscaleSlider" min="0" max="100" value="0">
                                            <span id="grayscaleValue">0%</span>
                                        </div>
                                    </div>
                                    <div class="property-item">
                                        <label>边框粗细</label>
                                        <div class="border-control">
                                            <button class="border-btn" data-size="1">细</button>
                                            <button class="border-btn active" data-size="2">中</button>
                                            <button class="border-btn" data-size="3">粗</button>
                                        </div>
                                    </div>
                                    <div class="property-item">
                                        <label>圆角</label>
                                        <div class="radius-control">
                                            <button class="radius-btn" data-radius="0">直角</button>
                                            <button class="radius-btn active" data-radius="8">圆角</button>
                                            <button class="radius-btn" data-radius="20">大圆角</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 需求文档区域 -->
                <div class="document-section">
                    <div class="section-header">
                        <div class="section-title">
                            <i class="fas fa-file-alt"></i>
                            <span>需求文档</span>
                        </div>
                        <div class="section-actions">
                            <button class="action-btn">
                                <i class="fas fa-expand"></i>
                                <span>最大化</span>
                            </button>
                            <button class="action-btn">
                                <i class="fas fa-download"></i>
                                <span>导出</span>
                            </button>
                        </div>
                    </div>
                    
                    <div class="document-editor">
                        <div class="editor-toolbar">
                            <button class="tool-btn"><i class="fas fa-bold"></i></button>
                            <button class="tool-btn"><i class="fas fa-italic"></i></button>
                            <button class="tool-btn"><i class="fas fa-list-ul"></i></button>
                            <button class="tool-btn"><i class="fas fa-list-ol"></i></button>
                            <button class="tool-btn"><i class="fas fa-link"></i></button>
                            <button class="tool-btn"><i class="fas fa-image"></i></button>
                        </div>
                        <textarea class="markdown-editor" id="demandEditor" placeholder="在此处编辑需求文档...">
# 购物车页面优化需求

## 需求背景
用户反馈购物车操作不够便捷，特别是在批量操作和价格计算方面。

## 用户痛点
1. 无法批量选择商品
2. 价格计算不实时
3. 优惠券使用不直观

## 解决方案
1. 添加全选/反选功能
2. 实时计算总价
3. 优化优惠券展示

## 页面元素
- 商品列表（可勾选）
- 价格汇总区域
- 优惠券选择器
- 结算按钮

## 交互说明
1. 勾选商品时实时更新总价
2. 点击优惠券展开选择面板
3. 结算按钮根据选中状态变化
                        </textarea>
                    </div>
                </div>
            </main>
        </div>

        <!-- 底部状态栏 -->
        <footer class="app-footer">
            <div class="footer-left">
                <span class="status-item">
                    <i class="fas fa-layer-group"></i>
                    <span>组件数: <span id="componentCount">0</span></span>
                </span>
                <span class="status-item">
                    <i class="fas fa-clock"></i>
                    <span>最后保存: 刚刚</span>
                </span>
            </div>
            <div class="footer-right">
                <span class="hint-text">
                    <i class="fas fa-lightbulb"></i>
                    <span>提示: 使用拖拽方式添加组件，右键点击编辑属性</span>
                </span>
            </div>
        </footer>
    </div>

    <script src="../js/prototype.js"></script>
</body>
</html>
